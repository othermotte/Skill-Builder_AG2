steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: 
      - '-c'
      - |
        docker build -t gcr.io/$PROJECT_ID/skill-builder-ag2 \
        --build-arg VITE_GEMINI_API_KEY=$$GEMINI_API_KEY \
        .
    secretEnv: ['GEMINI_API_KEY']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/skill-builder-ag2']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'skill-builder-ag2'
      - '--image'
      - 'gcr.io/$PROJECT_ID/skill-builder-ag2'
      - '--region'
      - 'europe-west1' # Updated region from screenshot
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/skill-builder-ag2'

availableSecrets:
  secretManager:
  - versionName: projects/313963271461/secrets/GEMINI_API_KEY/versions/latest
    env: 'GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
